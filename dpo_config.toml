# =============================================================================
# Anima LoRA DPO (Direct Preference Optimization) 配置文件
# =============================================================================

[Model]
# ---------------- 基础路径配置 ----------------
# 模型加载路径，填写clip_model、text_encoder、transformer、vae、model_index.json所在的文件夹路径
anima_repo_root = "/root/NewbieLoraTrainer/AnimaLoraToolkit/models" 
transformer_path = "/root/autodl-tmp/Anima/anima-preview2.safetensors"
vae_path = "/root/autodl-tmp/Anima/qwen_image_vae.safetensors"
qwen_model_path = "/root/autodl-tmp/Anima/qwen_3_06b"
t5_tokenizer_path = "/root/autodl-tmp/Anima/t5_tokenizer" 

# SFT LoRA 路径 (重要)
# DPO 通常在 SFT 之后进行。指向你 train_newbie_lora.py 训练出的文件夹
sft_lora_path = "/root/autodl-tmp/output_b/AnimaLoRA-b_ema"

# 偏好数据集路径 (JSON)
# 由 dataset_reward.py 生成的带有 "dpo_pair" 字段的 JSON
preference_json = "/root/autodl-tmp/gen_dataset/dataset_scored.json"

# 输出目录
output_dir = "/root/autodl-tmp/output_dpo"
output_name = "AnimaDPOLoRA"

# wandb的api key, 用于查看训练损失与过程 
wandb_key = ""

# ---------------- 训练参数 ----------------
train_batch_size = 1
gradient_accumulation_steps = 8

num_epochs = 13
save_epochs_interval = 1

# DPO 学习率通常比 SFT 低一个数量级
learning_rate = 1e-5  # SFT常用 1e-4，DPO 建议 5e-6 ~ 1e-5
lr_scheduler = "constant_with_warmup"
lr_warmup_steps = 100

use_cache = true

# 是否启用 EMA (指数移动平均)
use_ema = true

# EMA 衰减率
ema_decay = 0.99

# ---------------- DPO 算法参数 (核心) ----------------
# SDPO 正则化强度 (Beta)
beta = 1000.0
# SDPO 胜者保护系数 (Winner Preserving Mu)
# 0.0 = 关闭 (标准 DPO),  > 0.0 = 开启（保护生成质量）
mu = 0.8

# DMPO 目标分布系数 (Alpha)
# 0.0 = 关闭 (标准 DPO), > 0.0 = 开启（越小越严格）
dmpo_alpha = 0.01

# ---------------- 数据集参数 ----------------
dataloader_num_workers = 4
caption_dropout_rate = 0.05
# 真实图像混合比例
real_ratio = 0.33

# ---------------- 杂项 ----------------
mixed_precision = "bf16"
gradient_checkpointing = true

[Optimization]
optimizer_type = "AdamW8bit"
weight_decay = 0.0001
gradient_clip_norm = 1.0
use_flash_attention_2 = true
